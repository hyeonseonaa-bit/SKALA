name: springboot-backend-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: skala-2025
  K8S_NAMESPACE: skala3-ai1-devops
  K8S_DEPLOYMENT_NAME: skala-stock-api
  K8S_CONTAINER_NAME: app
  HARBOR_REGISTRY: amdp-registry.skala-ai.com
  HARBOR_PROJECT: skala26a-ai1
  IMAGE_NAME: a3010-skala-stock-api

jobs:
  ci:
    name: Build Spring Boot with Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE_SpringBoot/skala-stock-api
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Build application
        run: ./mvnw clean package

  cd:
    name: Build Image, Push to Harbor, Deploy to EKS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: BE_SpringBoot/skala-stock-api

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Build application JAR
        run: ./mvnw clean package

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Harbor
        uses: docker/build-push-action@v6
        with:
          context: BE_SpringBoot/skala-stock-api
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

