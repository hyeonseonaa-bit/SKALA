<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKALA Digital Library</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@300;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-deep: #0f1117;
        --bg-card: #1a1d26;
        --accent-purple: #8b5cf6;
        --text-main: #e2e8f0;
        --text-dim: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
      }

      body {
        background-color: var(--bg-deep);
        font-family: "Noto Sans KR", sans-serif;
        color: var(--text-main);
        letter-spacing: -0.02em;
      }
      .container {
        max-width: 900px;
        padding: 60px 20px;
      }
      .main-card {
        background: var(--bg-card);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        margin-bottom: 30px;
      }
      h1 {
        font-family: "Outfit", sans-serif;
        font-weight: 600;
        background: linear-gradient(to right, #fff, var(--accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 40px;
      }

      /* 검색 영역 */
      .search-area {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.03);
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
        gap: 15px;
      }
      .search-label {
        font-weight: 700;
        color: var(--accent-purple);
        white-space: nowrap;
      }

      .form-control,
      .form-select {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--border) !important;
        color: white !important;
        box-shadow: none !important;
      }
      .form-select option {
        background-color: #1a1d26;
        color: white;
      }

      /* 도서 */
      .book-item {
        background: rgba(255, 255, 255, 0.02) !important;
        border: 1px solid var(--border) !important;
        border-radius: 16px !important;
        margin-bottom: 12px;
        padding: 20px !important;
        transition: 0.2s;
      }
      .category-tag {
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(139, 92, 246, 0.1);
        color: var(--accent-purple);
        font-weight: 600;
        margin-bottom: 5px;
        display: inline-block;
      }
      .stock-badge {
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: 500;
      }
      .stock-in {
        background: rgba(52, 211, 153, 0.15);
        color: #34d399;
      }
      .stock-out {
        background: rgba(248, 113, 113, 0.15);
        color: #f87171;
      }

      .btn-purple {
        background: var(--accent-purple);
        border: none;
        color: white;
        font-weight: 600;
        border-radius: 10px;
        transition: 0.2s;
      }
      .btn-purple:hover {
        opacity: 0.9;
        transform: scale(1.02);
      }
      .btn-outline-magic {
        border: 1px solid var(--accent-purple);
        color: var(--accent-purple);
        background: transparent;
        border-radius: 10px;
        padding: 8px 20px;
        font-weight: 600;
        transition: 0.2s;
      }
      .btn-outline-magic:hover {
        background: var(--accent-purple);
        color: white;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 40px 0 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
      }
      .stats-card {
        background: linear-gradient(135deg, #2e1065 0%, #1a1d26 100%);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        border: 1px solid var(--border);
      }
      .mini-note {
        color: var(--text-dim);
        font-size: 0.9rem;
      }
      .divider-soft {
        opacity: 0.12;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="main-card">
        <h1 class="text-center">🪄SKALA Bookstore🪄</h1>

        <div class="search-area mb-4">
          <span class="search-label">도서 검색</span>
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="찾으시는 도서명을 입력하세요..."
          />
          <button
            type="button"
            class="btn btn-purple text-nowrap px-4"
            id="sortBtn"
          >
            낮은 가격순
          </button>
        </div>

        <div class="section-header">
          <span class="fw-bold text-secondary">1. 모든 도서 목록</span>
        </div>
        <div id="titleList"></div>

        <div class="section-header">
          <span class="fw-bold text-secondary"
            >2. 즉시 구매 가능 도서(재고 있음)</span
          >
        </div>
        <div id="inStock"></div>

        <div class="section-header">
          <span class="fw-bold text-secondary">3. 프로그래밍 도서</span>
        </div>
        <div id="programming"></div>

        <div class="section-header">
          <span class="fw-bold text-secondary">4. 카테고리 별 도서 목록</span>
          <select id="categoryFilter" class="form-select w-auto">
            <option value="전체">모든 카테고리</option>
            <option value="프로그래밍">프로그래밍</option>
            <option value="경제">경제</option>
            <option value="소설">소설</option>
          </select>
        </div>
        <div id="categoryList"></div>

        <div class="stats-card mt-4">
          <div style="color: var(--text-dim); font-size: 0.9rem">
            5. 평균 도서 가격
          </div>
          <div
            id="avePrice"
            style="
              font-size: 1.8rem;
              font-family: &quot;Outfit&quot;;
              font-weight: 600;
            "
          ></div>
        </div>
      </div>

      <div class="main-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0" style="color: var(--accent-purple)">
            ⚙️ 관리자 설정
          </h5>
          <button type="button" class="btn btn-outline-magic" id="stockFixBtn">
            5. 품절 도서 일괄 보충 (+10)
          </button>
        </div>

        <div id="changeStock"></div>

        <hr class="divider-soft my-4" />

        <h6 class="mb-2 text-secondary">6. 신규 도서 추가</h6>

        <form id="bookForm" class="row g-3">
          <div class="col-md-8">
            <label class="form-label small text-secondary">도서 제목</label>
            <input type="text" id="inputTitle" class="form-control" required />
          </div>
          <div class="col-md-4">
            <label class="form-label small text-secondary">기록자(저자)</label>
            <input type="text" id="inputAuthor" class="form-control" required />
          </div>
          <div class="col-md-4">
            <label class="form-label small text-secondary">카테고리</label>
            <select id="inputCategory" class="form-select">
              <option value="프로그래밍">프로그래밍</option>
              <option value="경제">경제</option>
              <option value="소설">소설</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label small text-secondary">가격</label>
            <input
              type="number"
              id="inputPrice"
              class="form-control"
              required
              min="1"
            />
          </div>
          <div class="col-md-4">
            <label class="form-label small text-secondary">재고 수량</label>
            <input
              type="number"
              id="inputStock"
              class="form-control"
              required
              min="0"
            />
          </div>
          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-purple w-100 py-3">
              라이브러리에 신규 도서 등록
            </button>
          </div>
        </form>

        <div class="section-header mt-4">
          <span class="fw-bold text-secondary">추가된 도서</span>
        </div>
        <div id="addBooks"></div>
      </div>
    </div>

    <script>
      let books = [
        {
          title: "자바스크립트 완벽 가이드",
          author: "David Flanagan",
          price: 35000,
          stock: 5,
          category: "프로그래밍",
        },
        {
          title: "모던 자바스크립트 Deep Dive",
          author: "이용모",
          price: 40000,
          stock: 0,
          category: "프로그래밍",
        },
        {
          title: "돈의 심리학",
          author: "모건 하우절",
          price: 18000,
          stock: 3,
          category: "경제",
        },
        {
          title: "불편한 편의점",
          author: "김호연",
          price: 14500,
          stock: 2,
          category: "소설",
        },
      ];

      // 도서 정보

      function createBookNode(book) {
        const isStock = book.stock > 0;

        const wrap = document.createElement("div");
        wrap.className =
          "book-item d-flex justify-content-between align-items-center";

        wrap.innerHTML = `
          <div>
            <span class="category-tag">${book.category}</span>
            <div class="fw-bold fs-5">${book.title}</div>
            <div class="small text-secondary">${book.author}</div>
          </div>
          <div class="text-end">
            <div class="fw-bold mb-2" style="font-family: 'Outfit';">
              ${book.price.toLocaleString()} 원
            </div>
            <span class="stock-badge ${isStock ? "stock-in" : "stock-out"}">
              ${isStock ? `재고 (${book.stock}권)` : "품절"}
            </span>
          </div>
        `;
        return wrap;
      }

      function clearBox(id) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = "";
      }

      function getFilters() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const selectedCategory =
          document.getElementById("categoryFilter").value;
        return { searchTerm, selectedCategory };
      }

      // 1. 모든 도서 목록

      function printTitles() {
        const { searchTerm } = getFilters();
        const box = document.getElementById("titleList");
        box.innerHTML = "";

        for (let i = 0; i < books.length; i++) {
          const b = books[i];
          if (b.title.toLowerCase().includes(searchTerm)) {
            box.appendChild(createBookNode(b));
          }
        }
      }

      // 2. 구매 가능 도서

      function printInStockBooks() {
        const { searchTerm } = getFilters();
        const box = document.getElementById("inStock");
        box.innerHTML = "";

        for (let value of books) {
          if (
            value.stock > 0 &&
            value.title.toLowerCase().includes(searchTerm)
          ) {
            box.appendChild(createBookNode(value));
          }
        }
      }

      // 3. 프로그래밍 도서 리스트

      function printProgrammingBooks() {
        const { searchTerm } = getFilters();
        const box = document.getElementById("programming");
        box.innerHTML = "";

        books.forEach((b) => {
          if (
            b.category === "프로그래밍" &&
            b.title.toLowerCase().includes(searchTerm)
          ) {
            box.appendChild(createBookNode(b));
          }
        });
      }

      // 카테고리 별 목록
      function renderCategoryList() {
        const { searchTerm, selectedCategory } = getFilters();
        const box = document.getElementById("categoryList");
        box.innerHTML = "";

        for (let i = 0; i < books.length; i++) {
          const b = books[i];
          const okSearch = b.title.toLowerCase().includes(searchTerm);
          const okCate =
            selectedCategory === "전체" || b.category === selectedCategory;

          if (okSearch && okCate) {
            box.appendChild(createBookNode(b));
          }
        }
      }

      // 4. 평균 가격

      function averagePrice() {
        let sum = 0;

        for (let value of books) {
          sum += value.price;
        }

        const avg = books.length ? sum / books.length : 0;
        document.getElementById("avePrice").textContent =
          `${Math.floor(avg).toLocaleString()} 원`;
      }

      // 5. 재고 보충
      function updateStock() {
        const box = document.getElementById("changeStock");
        box.innerHTML = "";

        let count = 0;

        for (let i = 0; i < books.length; i++) {
          if (books[i].stock === 0) {
            const before = books[i].stock;
            books[i].stock += 10;
            const after = books[i].stock;
            count++;
          }
        }

        alert(
          count > 0
            ? `${count}개의 품절 도서가 보충되었습니다.`
            : "현재 품절된 도서가 없습니다.",
        );
        renderApp();
      }

      // 가격 낮은 순 정렬

      function sortBooks() {
        for (let i = 0; i < books.length - 1; i++) {
          for (let j = 0; j < books.length - 1 - i; j++) {
            if (books[j].price > books[j + 1].price) {
              const tmp = books[j];
              books[j] = books[j + 1];
              books[j + 1] = tmp;
            }
          }
        }
        renderApp();
      }

      function addBookFromForm(e) {
        e.preventDefault();

        const newBook = {
          title: document.getElementById("inputTitle").value.trim(),
          author: document.getElementById("inputAuthor").value.trim(),
          category: document.getElementById("inputCategory").value,
          price: Number(document.getElementById("inputPrice").value),
          stock: Number(document.getElementById("inputStock").value),
        };

        if (!newBook.title || !newBook.author) {
          alert("제목/저자를 입력해주세요.");
          return;
        }
        if (!Number.isFinite(newBook.price) || newBook.price <= 0) {
          alert("가격은 1 이상 숫자여야 합니다.");
          return;
        }
        if (!Number.isFinite(newBook.stock) || newBook.stock < 0) {
          alert("재고는 0 이상 숫자여야 합니다.");
          return;
        }

        books.push(newBook);

        const addBox = document.getElementById("addBooks");
        addBox.prepend(createBookNode(newBook));

        renderApp();
        e.target.reset();

        alert("신규 도서가 추가되었습니다!");
      }

      function renderApp() {
        printTitles();
        printInStockBooks();
        printProgrammingBooks();
        renderCategoryList();
        averagePrice();
      }

      // 이벤트 연결

      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("searchInput")
          .addEventListener("keyup", renderApp);
        document
          .getElementById("categoryFilter")
          .addEventListener("change", renderApp);

        document
          .getElementById("stockFixBtn")
          .addEventListener("click", updateStock);
        document.getElementById("sortBtn").addEventListener("click", sortBooks);

        document
          .getElementById("bookForm")
          .addEventListener("submit", addBookFromForm);

        renderApp();
      });
    </script>
  </body>
</html>
